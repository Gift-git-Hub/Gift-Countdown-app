<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road to complete my course</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>

<body>
    <h1>COOL COUNT DOWN TIMER</h1>
    <div class="container">
        <span>
            <label for="min"> minutes</label>
            <input type="number" name="minutes" id="min" value="00" min="0" max="60">
        </span>
        <span>
            <label for="sec">seconds</label>
            <input type="number" name="seconds" id="sec" value="00" min="0" max="60">
        </span>
        <p class="outputimeleft">00:00</p>
        <button type="button" id="button">countdown</button>
    </div>
</body>

</html>
